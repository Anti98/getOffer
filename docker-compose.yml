networks:
  infrastructure-net:
    driver: bridge

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-candidate_db}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infrastructure-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-candidate_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-offers_db}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - infrastructure-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh mongodb://localhost:27017/admin -u ${MONGO_INITDB_ROOT_USERNAME:-root} -p ${MONGO_INITDB_ROOT_PASSWORD:-example} --quiet --eval \"db.adminCommand('ping').ok\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - infrastructure-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    user: "0:0"
    ports:
      - "${KAFKA_PORT:-9092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - infrastructure-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s  

  candidate-service:
    build:
      context: ./candidate-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-candidate_db}
      DB_USERNAME: ${POSTGRES_USER:-myuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-mypass}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      TOPIC_CANDIDATE_CREATED: ${TOPIC_CANDIDATE_CREATED:-candidate-created}
      JPA_SHOW_SQL: ${CANDIDATE_JPA_SHOW_SQL:-false}
    ports:
      - "${CANDIDATE_SERVICE_PORT:-8080}:8080"
    networks:
      - infrastructure-net
    restart: unless-stopped

  calculation-service:
    build:
      context: ./calculation-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      TOPIC_CANDIDATE_CREATED: ${TOPIC_CANDIDATE_CREATED:-candidate-created}
      TOPIC_CALCULATION_COMPLETED: ${TOPIC_CALCULATION_COMPLETED:-calculation-completed}
      CALCULATION_CONSUMER_GROUP: ${CALCULATION_CONSUMER_GROUP:-calculation-group}
      KAFKA_LOG_LEVEL: ${CALCULATION_KAFKA_LOG_LEVEL:-INFO}
      COEFFICIENT_MARKET: ${COEFFICIENT_MARKET:-100}
      COEFFICIENT_EXPERIENCE_BONUS_PERCENT: ${COEFFICIENT_EXPERIENCE_BONUS_PERCENT:-5}
      COEFFICIENT_BASE_SALARY_JUNIOR: ${COEFFICIENT_BASE_SALARY_JUNIOR:-150000}
      COEFFICIENT_BASE_SALARY_MIDDLE: ${COEFFICIENT_BASE_SALARY_MIDDLE:-250000}
      COEFFICIENT_BASE_SALARY_SENIOR: ${COEFFICIENT_BASE_SALARY_SENIOR:-350000}
    ports:
      - "${CALCULATION_SERVICE_PORT:-8081}:8081"
    networks:
      - infrastructure-net
    restart: unless-stopped

  offer-service:
    build:
      context: ./offer-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      TOPIC_CALCULATION_COMPLETED: ${TOPIC_CALCULATION_COMPLETED:-calculation-completed}
      OFFER_CONSUMER_GROUP: ${OFFER_CONSUMER_GROUP:-offer-group}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-example}@mongodb:27017/${MONGO_DB:-offers_db}?authSource=admin
      OFFER_AUTOCONFIG_LOG_LEVEL: ${OFFER_AUTOCONFIG_LOG_LEVEL:-INFO}
    ports:
      - "${OFFER_SERVICE_PORT:-8082}:8082"
    networks:
      - infrastructure-net
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
